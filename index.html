<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vazifalar</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #fff; padding: 16px; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    .row { display: flex; gap: 8px; margin-bottom: 16px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; }
    .add { padding: 10px 16px; background: #0088cc; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; }
    .task { display: flex; align-items: center; gap: 10px; padding: 12px; margin-bottom: 8px; background: #f5f5f5; border-radius: 10px; }
    .task.done span { text-decoration: line-through; opacity: 0.5; }
    .task span { flex: 1; font-size: 15px; }
    .task input[type=checkbox] { width: 20px; height: 20px; }
    .del { background: none; border: none; color: #ff453a; font-size: 22px; cursor: pointer; }
    .empty { text-align: center; color: #999; margin-top: 40px; }
  </style>
</head>
<body>
  <h1>📝 Vazifalarim</h1>
  <div class="row">
    <input id="inp" type="text" placeholder="Yangi vazifa..." />
    <button class="add" onclick="add()">Qo'sh</button>
  </div>
  <div id="list"></div>
  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); }
    function render() {
      const el = document.getElementById('list');
      if (!tasks.length) { el.innerHTML = '<div class="empty">Hozircha vazifa yo\'q</div>'; return; }
      el.innerHTML = tasks.map((t,i) => `<div class="task ${t.done?'done':''}"><input type="checkbox" ${t.done?'checked':''} onchange="toggle(${i})"><span>${t.text}</span><button class="del" onclick="del(${i})">×</button></div>`).join('');
    }
    function add() {
      const inp = document.getElementById('inp');
      if (!inp.value.trim()) return;
      tasks.unshift({text: inp.value.trim(), done: false});
      inp.value = ''; save(); render();
    }
    function toggle(i) { tasks[i].done = !tasks[i].done; save(); render(); }
    function del(i) { tasks.splice(i,1); save(); render(); }
    document.getElementById('inp').addEventListener('keypress', e => { if(e.key==='Enter') add(); });
    render();
  </script>
</body>
</html>
